name: Deploy MEAN App

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 🔐 Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🐳 Build & Push Backend
      - name: Build Backend Image
        run: |
          docker build -t babludevops701/mean-backend:${{ github.sha }} ./backend
          docker push babludevops701/mean-backend:${{ github.sha }}

      # 🐳 Build & Push Frontend
      - name: Build Frontend Image
        run: |
          docker build --no-cache -t babludevops701/mean-frontend:${{ github.sha }} ./frontend
          docker push babludevops701/mean-frontend:${{ github.sha }}

      # 🚀 Deploy
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            export TAG=${{ github.sha }}

            cd /home/ubuntu

            if [ ! -d "Cloud-Native-MEAN-Stack-App-with-Docker-CI-CD-on-AWS" ]; then
              git clone https://github.com/Bablu7011/Cloud-Native-MEAN-Stack-App-with-Docker-CI-CD-on-AWS
            fi

            cd Cloud-Native-MEAN-Stack-App-with-Docker-CI-CD-on-AWS
            git pull origin main

            echo "📥 Pulling new images..."
            sudo docker pull babludevops701/mean-backend:$TAG
            sudo docker pull babludevops701/mean-frontend:$TAG

            # 🔍 Get current running image IDs
            OLD_BACKEND=$(sudo docker inspect --format='{{.Image}}' backend 2>/dev/null || echo "")
            OLD_FRONTEND=$(sudo docker inspect --format='{{.Image}}' frontend 2>/dev/null || echo "")

            # 🔍 Get new image IDs
            NEW_BACKEND=$(sudo docker images -q babludevops701/mean-backend:$TAG)
            NEW_FRONTEND=$(sudo docker images -q babludevops701/mean-frontend:$TAG)

            echo "Old Backend: $OLD_BACKEND"
            echo "New Backend: $NEW_BACKEND"

            echo "Old Frontend: $OLD_FRONTEND"
            echo "New Frontend: $NEW_FRONTEND"

            # 🚀 Restart only if image changed
            if [ "$OLD_BACKEND" != "$NEW_BACKEND" ] || [ "$OLD_FRONTEND" != "$NEW_FRONTEND" ]; then
              echo "🔄 Changes detected → Restarting containers..."

              TAG=$TAG sudo docker-compose down
              sudo TAG=$TAG docker-compose up -d --force-recreate

            else
              echo "✅ No changes in image → Skipping restart"
            fi

            echo "🧹 Cleaning unused images..."
            sudo docker image prune -f

            echo "✅ Deployment Done!"